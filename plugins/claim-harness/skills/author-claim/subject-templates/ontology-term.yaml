# ontology-term subject template
#
# Use when the claim targets a concept registered in an OBO / biomedical
# ontology: HPO (phenotype), MONDO (disease), GO (function), UBERON (anatomy),
# CL (cell type), CHEBI (small molecule), PR (protein), etc.

kind: ontology_term
id: "{{CURIE}}"                                   # e.g. HP:0001250, MONDO:0007254, GO:0006355
display: "{{human-readable name}}"
ontology: "{{HPO|MONDO|GO|EFO|UBERON|CL|CHEBI|PR|DOID|NCIT|SO|ECO|other}}"
ontology_release: "{{ISO-date}}"                   # e.g. 2026-01-16 — pinning the release matters
uri: "http://purl.obolibrary.org/obo/{{ID_with_underscore}}"
propagation: "{{self_only|self_or_descendant|self_or_ancestor|exact_match}}"
