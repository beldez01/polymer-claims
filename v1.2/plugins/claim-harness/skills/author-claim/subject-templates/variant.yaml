# variant-vrs subject template
#
# Use when the claim targets a specific sequence variant. Prefer GA4GH VRS
# canonical IDs over plain HGVS — VRS IDs are content-hashed and resolver-safe.

kind: variant_vrs
id: "ga4gh:VA.{{sha512t24u}}"                               # canonical VRS ID
display: "{{hgvs}} ({{gene-context}})"
vrs_version: "1.3"
assembly: "GRCh38.p14"                                       # optional but recommended
hgvs: "{{chr:g.…}}"                                         # optional convenience
canonical_allele:                                            # inline VRS JSON (optional if id resolves)
  type: Allele
  location:
    type: SequenceLocation
    sequence_id: "ga4gh:SQ.{{…}}"
    interval: {type: SimpleInterval, start: 0, end: 1}
  state:
    type: LiteralSequenceExpression
    sequence: "{{alt-base}}"
