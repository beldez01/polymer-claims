name: auto-merge-licensed

on:
  pull_request:
    types: [labeled, synchronize, opened]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  try:
    # Only fires on PRs labeled LICENSED. Tier gating is below.
    if: >-
      github.event.pull_request != null &&
      contains(github.event.pull_request.labels.*.name, 'admin-review:licensed') &&
      !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bail if contested
        run: |
          LABELS='${{ toJson(github.event.pull_request.labels) }}'
          if echo "$LABELS" | jq -e '.[] | select(.name=="contested")' > /dev/null; then
            echo "PR is labeled contested; skipping auto-merge."
            exit 0
          fi

      - name: Look up author tier
        id: tier
        run: |
          LOGIN="${{ github.event.pull_request.user.login }}"
          if [ -f "corpus/contributors/$LOGIN.yml" ]; then
            TIER=$(yq -r '.tier' "corpus/contributors/$LOGIN.yml" || echo 0)
          else
            TIER=0
          fi
          echo "tier=$TIER" >> "$GITHUB_OUTPUT"
          echo "Contributor $LOGIN resolved to tier=$TIER"

      - name: Abort if Tier 0
        if: ${{ steps.tier.outputs.tier == '0' }}
        run: |
          echo "Tier 0 submitter — admin review required. Not auto-merging."
          exit 0

      - name: Enforce tier-2 scope-guard (own domain only)
        if: ${{ steps.tier.outputs.tier == '2' }}
        run: |
          # Tier-2 reviewers may merge claims only under domains they maintain.
          # The scope check lives in `corpus/domains/<d>/_domain.yml:maintainers`.
          LOGIN="${{ github.event.pull_request.user.login }}"
          # If any changed path is outside the login's maintained domains, bail.
          gh pr view ${{ github.event.pull_request.number }} --json files -q '.files[].path' \
            | grep '^corpus/domains/' | awk -F/ '{print $3}' | sort -u > /tmp/touched_domains.txt
          MAINTAINED=()
          for yml in corpus/domains/*/_domain.yml; do
            if yq -e ".maintainers[] | select(. == \"$LOGIN\")" "$yml" > /dev/null 2>&1; then
              MAINTAINED+=("$(basename "$(dirname "$yml")")")
            fi
          done
          printf '%s\n' "${MAINTAINED[@]}" | sort -u > /tmp/maintained.txt
          if ! comm -23 /tmp/touched_domains.txt /tmp/maintained.txt | grep -q '^$'; then
            UNAUTHORIZED=$(comm -23 /tmp/touched_domains.txt /tmp/maintained.txt | paste -sd, -)
            if [ -n "$UNAUTHORIZED" ]; then
              echo "Tier-2 $LOGIN tried to merge outside maintained domains: $UNAUTHORIZED"
              exit 1
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prevent self-merge for Tier-2+
        if: ${{ steps.tier.outputs.tier >= '2' && github.event.pull_request.user.login == github.actor }}
        run: |
          echo "Tier-2+ contributors cannot self-merge. Waiting for a peer."
          exit 0

      - name: Merge
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
