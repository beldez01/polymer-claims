name: publish-formalclaim

on:
  push:
    tags: ['formalclaim-v*.*.*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # REQUIRED for PyPI Trusted Publishing (OIDC)

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: formalclaim
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: '3.12'
      - name: Build wheel + sdist
        run: uv build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: formalclaim/dist
          print-hash: true
          # OIDC trusted-publisher. Configure pending publisher at
          #   https://pypi.org/manage/account/publishing/
          #   Project: polymer-formalclaim | Owner: beldez01
          #   Repository: polymer-claims | Workflow: publish-formalclaim.yml
