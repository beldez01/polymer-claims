name: schema-sync

on:
  pull_request:
    paths:
      - 'corpus/schema/**'
      - 'plugins/claim-harness/schemas/**'
      - 'scripts/sync_schema.sh'
  push:
    branches: [main]
    paths:
      - 'corpus/schema/**'
      - 'plugins/claim-harness/schemas/**'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify the plugin schema matches the corpus canonical
        run: bash scripts/sync_schema.sh --check
